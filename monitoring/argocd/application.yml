apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: project-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/jay-devops-work/ArgoCD-project.git
    targetRevision: main
    path: app

  destination:
    server: https://kubernetes.default.svc
    namespace: project-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
