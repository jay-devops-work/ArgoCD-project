apiVersion: apps/v1
kind: Deployment
metadata:
  name: project
  namespace: project-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project
  template:
    metadata:
      labels:
        app: project
    spec:
      containers:
        - name: project
          image: jaydevopswork/project:v3
          ports:
            - containerPort: 80
